# 后台管理:更严的限流(管理操作低频)
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=admin_conn:10m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    limit_conn admin_conn 20;

    # 屏蔽常见探测路径
    location ~* \.(env|git|sql|bak|swp)$ { return 444; }
    location ~* /(\.env|\.git|wp-admin|wp-login|phpmyadmin) { return 444; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        limit_req zone=admin_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
