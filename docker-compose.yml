version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: stock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Stock@2024}
      MYSQL_DATABASE: stock_screener
      MYSQL_CHARSET: utf8mb4
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stock-redis
    # host 6379 已被本地 Redis 占用,容器只暴露给 docker 内网
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  data-service:
    build: ./data-service
    container_name: stock-data-service
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - TZ=Asia/Shanghai
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-Stock@2024}
      - DB_NAME=stock_screener
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EM_CONCURRENCY=8
      - EM_JITTER_MIN_MS=50
      - EM_JITTER_MAX_MS=200
      - EM_SPOT_MODE=auto
      - WARMUP_ON_START=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: stock-backend
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_PASSWORD=${DB_PASSWORD:-Stock@2024}
      - REDIS_HOST=redis
      - DATA_SERVICE_URL=http://data-service:5001
      - JWT_SECRET=${JWT_SECRET:-StockScreenerSecretKey2024MustBe256BitsLong!!}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      data-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: stock-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin-frontend:
    build: ./admin-frontend
    container_name: stock-admin
    ports:
      # bind to localhost only — expose via frp/SSH tunnel when needed,
      # never directly to public internet
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
