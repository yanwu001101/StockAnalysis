version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: stock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Stock@2024}
      MYSQL_DATABASE: stock_screener
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  data-service:
    build: ./data-service
    container_name: stock-data-service
    ports:
      - "5001:5001"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - redis
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: stock-backend
    ports:
      - "8080:8080"
    environment:
      - DB_PASSWORD=${DB_PASSWORD:-Stock@2024}
      - REDIS_HOST=redis
      - DATA_SERVICE_URL=http://data-service:5001
      - JWT_SECRET=${JWT_SECRET:-StockScreenerSecretKey2024MustBe256BitsLong!!}
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      data-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: stock-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
